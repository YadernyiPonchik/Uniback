info:
  name: Reset Password
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:8000/auth/users/reset_password/
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "email": "superworker@gmail.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
